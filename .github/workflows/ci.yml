name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Swift version
        run: swift --version
      - name: Build
        run: swift build
      - name: Test
        run: swift test

  api-stability:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Diff public API against the latest release tag
        run: |
          BASELINE=$(git tag --list 'v*' --sort=-v:refname | head -1)
          if [ -z "$BASELINE" ]; then
            echo "No release tag found — skipping API diff."
            exit 0
          fi
          echo "Baseline: $BASELINE"
          set +e
          OUTPUT=$(swift package diagnose-api-breaking-changes "$BASELINE" 2>&1)
          CODE=$?
          echo "$OUTPUT"
          [ $CODE -eq 0 ] && exit 0
          # Fail only on an actual detected break; a baseline that no longer
          # builds on this toolchain (e.g. a tag predating a portability fix) warns.
          if echo "$OUTPUT" | grep -qiE "breakage|breaking change"; then
            echo "::error::Public API breakage detected against $BASELINE"
            exit 1
          fi
          echo "::warning::Baseline $BASELINE could not be evaluated on this toolchain; skipping the API diff."
          exit 0
